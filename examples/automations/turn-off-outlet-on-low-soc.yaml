# Turn off a non-essential outlet when battery drops below 30% during a grid outage.
# Replace `switch.your_pila_front_right_outlet` with whichever outlet is your
# "non-essential" one. Outlet entity IDs use the friendly name (e.g.
# "Front Right Outlet" → switch.your_pila_front_right_outlet). Confirm in
# Settings → Devices & services → MQTT → your Pila.

alias: Pila shed non-essential load on low battery
description: Turn off non-essential AC outlet when off-grid and SOC < 30%
trigger:
  - platform: numeric_state
    entity_id: sensor.your_pila_battery_soc
    below: 30
condition:
  - condition: state
    entity_id: sensor.your_pila_grid_status
    state: off_grid
action:
  - service: switch.turn_off
    target:
      entity_id: switch.your_pila_front_right_outlet
mode: single
